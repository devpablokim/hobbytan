<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 고객센터 — 실시간 음성 데모</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e5e5e5;font-family:'Pretendard',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}

.container{width:100%;max-width:480px;padding:24px}

/* Phone Frame */
.phone{border:1px solid #262626;background:#111;overflow:hidden;position:relative}
.phone-header{background:#0d0d0d;padding:16px 20px;border-bottom:1px solid #262626;text-align:center}
.phone-header h1{font-size:14px;color:#fff;font-weight:600}
.phone-header p{font-size:11px;color:#737373;margin-top:2px}

/* Status */
.status-bar{padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:8px;border-bottom:1px solid #1a1a1a}
.status-dot{width:10px;height:10px;border-radius:50%}
.status-dot.offline{background:#525252}
.status-dot.connecting{background:#f59e0b;animation:pulse 1s infinite}
.status-dot.online{background:#10b981;animation:pulse 2s infinite}
.status-dot.speaking{background:#3b82f6;animation:pulse .5s infinite}
.status-text{font-size:12px;color:#737373}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Transcript */
.transcript{padding:16px 20px;min-height:320px;max-height:400px;overflow-y:auto}
.msg{margin-bottom:12px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{text-align:left}
.msg.user{text-align:right}
.msg .bubble{display:inline-block;max-width:85%;padding:10px 14px;font-size:13px;line-height:1.5}
.msg.bot .bubble{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#d4d4d4}
.msg.user .bubble{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#d4d4d4}
.msg .label{font-size:10px;color:#525252;margin-bottom:4px}
.typing{color:#737373;font-size:12px;font-style:italic;padding:0 20px 8px}

/* Controls */
.controls{padding:20px;border-top:1px solid #262626;display:flex;align-items:center;justify-content:center;gap:16px}
.btn-mic{width:64px;height:64px;border-radius:50%;border:2px solid #333;background:transparent;color:#737373;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;font-size:24px}
.btn-mic:hover{border-color:#10b981;color:#10b981}
.btn-mic.active{border-color:#ef4444;background:rgba(239,68,68,.1);color:#ef4444;animation:pulse-ring 1.5s infinite}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}70%{box-shadow:0 0 0 12px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
.btn-end{padding:10px 20px;border:1px solid #333;background:transparent;color:#737373;cursor:pointer;font-size:12px}
.btn-end:hover{border-color:#ef4444;color:#ef4444}
.btn-start{padding:14px 32px;border:1px solid #10b981;background:rgba(16,185,129,.1);color:#10b981;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.btn-start:hover{background:rgba(16,185,129,.2)}

/* Volume Meter */
.volume-bar{height:3px;background:#1a1a1a;margin:0 20px}
.volume-level{height:100%;background:#10b981;width:0%;transition:width .1s}

/* Info */
.info{padding:12px 20px;border-top:1px solid #1a1a1a;font-size:10px;color:#404040;text-align:center}
</style>
</head>
<body>
<div class="container">
  <div class="phone">
    <div class="phone-header">
      <h1>🤖 하비탄AI 고객센터</h1>
      <p>ElevenLabs Conversational AI Demo</p>
    </div>

    <div class="status-bar">
      <div class="status-dot offline" id="statusDot"></div>
      <span class="status-text" id="statusText">대기 중</span>
    </div>

    <div class="volume-bar"><div class="volume-level" id="volumeLevel"></div></div>

    <div class="transcript" id="transcript">
      <div style="text-align:center;padding:80px 20px;color:#404040;font-size:13px">
        아래 "상담 시작" 버튼을 눌러<br>AI 상담원과 대화를 시작하세요
      </div>
    </div>

    <div id="typingIndicator" class="typing" style="display:none">AI 상담원이 답변 중...</div>

    <div class="controls" id="controls">
      <button class="btn-start" id="btnStart" onclick="startConversation()">📞 상담 시작</button>
    </div>

    <div class="info">
      마이크 권한이 필요합니다 · ElevenLabs Conversational AI · Agent: HOBBYTAN 고객센터
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
const AGENT_ID = typeof ELEVENLABS_AGENT_ID !== 'undefined' ? ELEVENLABS_AGENT_ID : 'agent_1701kkk02t4cepvry9g5rangctvt';
let conversation = null;
let audioContext = null;

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.textContent = text;
}

function addMessage(role, text) {
  const transcript = document.getElementById('transcript');
  // Clear placeholder
  if (transcript.querySelector('div[style]')) transcript.innerHTML = '';
  
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'agent' ? 'bot' : 'user');
  div.innerHTML = `
    <div class="label">${role === 'agent' ? '🤖 AI 상담원' : '👤 나'}</div>
    <div class="bubble">${text}</div>
  `;
  transcript.appendChild(div);
  transcript.scrollTop = transcript.scrollHeight;
}

function showControls(mode) {
  const controls = document.getElementById('controls');
  if (mode === 'active') {
    controls.innerHTML = `
      <button class="btn-mic active" id="btnMic" onclick="toggleMute()">🎤</button>
      <button class="btn-end" onclick="endConversation()">통화 종료</button>
    `;
  } else {
    controls.innerHTML = `<button class="btn-start" onclick="startConversation()">📞 상담 시작</button>`;
  }
}

async function startConversation() {
  try {
    setStatus('connecting', '연결 중...');
    
    // Request microphone
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    
    // Get signed URL
    const response = await fetch(`https://api.elevenlabs.io/v1/convai/conversation/get_signed_url?agent_id=${AGENT_ID}`, {
      method: 'GET',
      headers: { 'xi-api-key': API_KEY }
    });
    
    if (!response.ok) {
      // Try without signed URL (direct WebSocket)
      connectWebSocket(stream, null);
      return;
    }
    
    const data = await response.json();
    connectWebSocket(stream, data.signed_url);
    
  } catch (err) {
    console.error('Start error:', err);
    setStatus('offline', '오류: ' + err.message);
    
    // Fallback: try direct connection
    if (err.message.includes('getUserMedia')) {
      setStatus('offline', '마이크 권한을 허용해 주세요');
    }
  }
}

function connectWebSocket(stream, signedUrl) {
  const wsUrl = signedUrl || `wss://api.elevenlabs.io/v1/convai/conversation?agent_id=${AGENT_ID}`;
  
  const ws = new WebSocket(wsUrl);
  let isMuted = false;
  
  // Audio context for input
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioContext.createMediaStreamSource(stream);
  const processor = audioContext.createScriptProcessor(4096, 1, 1);
  
  // Audio playback
  let audioQueue = [];
  let isPlaying = false;
  
  async function playNextAudio() {
    if (audioQueue.length === 0) { isPlaying = false; return; }
    isPlaying = true;
    const audioData = audioQueue.shift();
    
    try {
      // PCM 16-bit mono 16kHz
      const pcm16 = new Int16Array(audioData);
      const float32 = new Float32Array(pcm16.length);
      for (let i = 0; i < pcm16.length; i++) {
        float32[i] = pcm16[i] / 32768;
      }
      
      const buffer = audioContext.createBuffer(1, float32.length, 16000);
      buffer.getChannelData(0).set(float32);
      
      const bufferSource = audioContext.createBufferSource();
      bufferSource.buffer = buffer;
      bufferSource.connect(audioContext.destination);
      bufferSource.onended = playNextAudio;
      bufferSource.start();
    } catch (e) {
      console.error('Audio play error:', e);
      playNextAudio();
    }
  }
  
  ws.onopen = () => {
    setStatus('online', '연결됨 — 말씀하세요');
    showControls('active');
    
    source.connect(processor);
    processor.connect(audioContext.destination);
    
    processor.onaudioprocess = (e) => {
      if (isMuted || ws.readyState !== WebSocket.OPEN) return;
      
      const input = e.inputBuffer.getChannelData(0);
      
      // Resample to 16kHz if needed
      const srcRate = audioContext.sampleRate;
      const dstRate = 16000;
      let samples = input;
      if (srcRate !== dstRate) {
        const ratio = srcRate / dstRate;
        const newLen = Math.floor(input.length / ratio);
        samples = new Float32Array(newLen);
        for (let i = 0; i < newLen; i++) {
          samples[i] = input[Math.floor(i * ratio)];
        }
      }
      
      const pcm16 = new Int16Array(samples.length);
      for (let i = 0; i < samples.length; i++) {
        pcm16[i] = Math.max(-32768, Math.min(32767, samples[i] * 32768));
      }
      
      // Send as base64
      const bytes = new Uint8Array(pcm16.buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      
      ws.send(JSON.stringify({
        user_audio_chunk: btoa(binary)
      }));
      
      // Volume meter
      let sum = 0;
      for (let i = 0; i < input.length; i++) sum += Math.abs(input[i]);
      const avg = sum / input.length;
      document.getElementById('volumeLevel').style.width = Math.min(100, avg * 500) + '%';
    };
  };
  
  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      
      if (msg.type === 'audio') {
        // Decode base64 audio
        const binary = atob(msg.audio.chunk);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        
        audioQueue.push(bytes.buffer);
        if (!isPlaying) playNextAudio();
        
        setStatus('speaking', 'AI 상담원 응답 중...');
      }
      
      if (msg.type === 'agent_response') {
        addMessage('agent', msg.agent_response);
        document.getElementById('typingIndicator').style.display = 'none';
      }
      
      if (msg.type === 'user_transcript') {
        addMessage('user', msg.user_transcript);
      }
      
      if (msg.type === 'interruption') {
        audioQueue = [];
        isPlaying = false;
      }
      
      if (msg.type === 'agent_response_correction') {
        // Update last agent message
        const msgs = document.querySelectorAll('.msg.bot .bubble');
        if (msgs.length > 0) {
          msgs[msgs.length - 1].textContent = msg.agent_response_correction;
        }
      }
      
      if (msg.type === 'conversation_initiation_metadata') {
        addMessage('agent', '안녕하세요, 하비탄AI 고객센터입니다. 무엇을 도와드릴까요?');
      }
      
    } catch (e) {
      console.log('WS message:', event.data);
    }
  };
  
  ws.onclose = () => {
    setStatus('offline', '통화 종료');
    showControls('start');
    stream.getTracks().forEach(t => t.stop());
    if (processor) { processor.disconnect(); source.disconnect(); }
  };
  
  ws.onerror = (err) => {
    console.error('WS error:', err);
    setStatus('offline', '연결 오류');
  };
  
  // Store for controls
  window._ws = ws;
  window._stream = stream;
  window._muted = { value: false };
  
  window.toggleMute = () => {
    isMuted = !isMuted;
    window._muted.value = isMuted;
    const btn = document.getElementById('btnMic');
    if (isMuted) {
      btn.classList.remove('active');
      btn.textContent = '🔇';
      btn.style.borderColor = '#525252';
      btn.style.color = '#525252';
    } else {
      btn.classList.add('active');
      btn.textContent = '🎤';
      btn.style.borderColor = '';
      btn.style.color = '';
    }
  };
  
  window.endConversation = () => {
    ws.close();
    stream.getTracks().forEach(t => t.stop());
    if (audioContext) audioContext.close();
    setStatus('offline', '통화 종료');
    showControls('start');
  };
}

// API Key loaded from config (not committed to git)
// For local dev: create config.js with: const API_KEY = 'your-key-here';
// For production: injected via build process
if (typeof API_KEY === 'undefined') {
  document.querySelector('.transcript').innerHTML = '<div style="text-align:center;padding:80px 20px;color:#ef4444;font-size:13px">⚠️ API 키가 설정되지 않았습니다.<br><br><span style="color:#737373;font-size:11px">config.js 파일을 생성해 주세요:<br>const API_KEY = "your-elevenlabs-api-key";</span></div>';
}
</script>
</body>
</html>
